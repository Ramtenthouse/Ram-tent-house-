<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ram Tent House - Booking Portal</title>
    <style>
        :root { --primary: #003d3d; --gold: #d4af37; --white: #ffffff; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            /* image_b5f281.png లోని బ్లూ డెకరేషన్ బ్యాక్‌గ్రౌండ్‌గా */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('image_b5f281.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .header { 
            background: rgba(0, 61, 61, 0.85); 
            color: white; text-align: center; padding: 40px 10px; 
            border-bottom: 4px solid var(--gold);
        }

        /* image_b5eec3.jpg లోగో డిజైన్ */
        .logo-box {
            width: 100px; height: 100px; background: var(--white);
            border-radius: 20%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--gold);
            overflow: hidden;
        }
        .logo-box img { width: 90%; height: auto; }

        .container { 
            max-width: 500px; margin: 30px auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 25px; /* image_b5eb9a.jpg స్టైల్ */
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: var(--primary); }

        /* image_b5eb9a.jpg లాంటి గుండ్రటి బాక్సులు */
        input[type="text"], input[type="tel"], input[type="date"], textarea {
            width: 100%; padding: 14px; border: 2px solid #ccc; 
            border-radius: 15px; box-sizing: border-box; font-size: 16px;
        }

        h3 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }

        .item-card { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #f9f9f9; padding: 12px 15px; border-radius: 15px; 
            margin-bottom: 10px; border: 1px solid #ddd;
        }

        .btn-qty { 
            width: 35px; height: 35px; background: var(--primary); 
            color: white; border: none; border-radius: 10px; cursor: pointer;
        }
        .qty-input { width: 50px; text-align: center; border: none; font-size: 18px; font-weight: bold; background: transparent; }

        .submit-btn { 
            width: 100%; background: var(--primary); color: white; 
            padding: 18px; border: none; border-radius: 15px; 
            font-size: 20px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .submit-btn:hover { background: #002222; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">
        <!-- ఇక్కడ image_b5eec3.jpg లోగో వస్తుంది -->
        <img src="image_b5eec3.jpg" alt="R Logo">
    </div>
    <h1 style="letter-spacing: 2px; margin: 0;">RAM TENT HOUSE</h1>
    <p>ప్రో: బి. రమేష్ | 📞 7306082427</p>
</div>

<div class="container">
    <form action="https://formspree.io/f/mbdwleja" method="POST">
        <input type="hidden" name="_next" value="https://ram-tent-house-.github.io/thanks.html">

        <div class="form-group">
            <label>Customer Name (పేరు):</label>
            <input type="text" name="Customer_Name" required placeholder="Enter Full Name">
        </div>

        <div class="form-group">
            <label>Customer Phone (ఫోన్):</label>
            <input type="tel" name="Customer_Phone" required placeholder="Enter 10 Digit Number" pattern="[0-9]{10}">
        </div>

        <div class="form-group">
            <label>Function Date (తేదీ):</label>
            <input type="date" name="Date" required>
        </div>

        <h3>Items (వస్తువుల ఎంపిక)</h3>
        
        <div class="item-card"><span>Plastic Chairs</span><div class="controls"><button type="button" class="btn-qty" onclick="q('c1',-1)">-</button><input type="number" name="Chairs" id="c1" value="0" readonly class="qty-input"><button type="button" class="btn-qty" onclick="q('c1',1)">+</button></div></div>
        <div class="item-card"><span>Steel Tables</span><div class="controls"><button type="button" class="btn-qty" onclick="q('t1',-1)">-</button><input type="number" name="Tables" id="t1" value="0" readonly class="qty-input"><button type="button" class="btn-qty" onclick="q('t1',1)">+</button></div></div>
        <div class="item-card"><span>Coolers / Fans</span><div class="controls"><button type="button" class="btn-qty" onclick="q('f1',-1)">-</button><input type="number" name="Fans" id="f1" value="0" readonly class="qty-input"><button type="button" class="btn-qty" onclick="q('f1',1)">+</button></div></div>
        <div class="item-card"><span>Lighting</span><div class="controls"><button type="button" class="btn-qty" onclick="q('l1',-1)">-</button><input type="number" name="Lights" id="l1" value="0" readonly class="qty-input"><button type="button" class="btn-qty" onclick="q('l1',1)">+</button></div></div>
        <div class="item-card"><span>Sound System</span><div class="controls"><button type="button" class="btn-qty" onclick="q('s1',-1)">-</button><input type="number" name="Sound" id="s1" value="0" readonly class="qty-input"><button type="button" class="btn-qty" onclick="q('s1',1)">+</button></div></div>

        <div class="form-group">
            <label>Others (ఇతర వివరాలు):</label>
            <textarea name="Message" rows="3" placeholder="మరిన్ని వివరాలు ఇక్కడ రాయండి..."></textarea>
        </div>

        <button type="submit" class="submit-btn">SUBMIT ORDER</button>
    </form>
</div>

<script>
    function q(id, v) {
        const i = document.getElementById(id);
        let val = parseInt(i.value) || 0;
        let res = val + v;
        if (res >= 0) i.value = res;
    }
</script>

</body>
</html>
