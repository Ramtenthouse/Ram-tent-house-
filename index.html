<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ram Tent House - Booking</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #006666; text-align: center; }
        input[type="text"], input[type="tel"], input[type="date"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn-qty { width: 35px; height: 35px; cursor: pointer; background: #006666; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .num { width: 40px; text-align: center; border: none; font-size: 16px; }
        .submit-btn { width: 100%; background: #006666; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="box">
    <h1>Ram Tent House</h1>
    <form action="https://formspree.io/f/mbdwleja" method="POST">
        <label>పేరు (Name):</label>
        <input type="text" name="Name" required>
        
        <label>ఫోన్ (Phone):</label>
        <input type="tel" name="Phone" required>
        
        <label>తేదీ (Date):</label>
        <input type="date" name="Date" required>

        <h3>వస్తువుల వివరాలు:</h3>
        <div class="row"><span>Waterproof Tent</span><div><button type="button" class="btn-qty" onclick="q('t1',-1)">-</button><input name="Waterproof_Tent" id="t1" value="0" class="num" readonly><button type="button" class="btn-qty" onclick="q('t1',1)">+</button></div></div>
        <div class="row"><span>Plastic Chairs</span><div><button type="button" class="btn-qty" onclick="q('c1',-1)">-</button><input name="Plastic_Chairs" id="c1" value="0" class="num" readonly><button type="button" class="btn-qty" onclick="q('c1',1)">+</button></div></div>
        <div class="row"><span>VIP Sofas</span><div><button type="button" class="btn-qty" onclick="q('s1',-1)">-</button><input name="VIP_Sofas" id="s1" value="0" class="num" readonly><button type="button" class="btn-qty" onclick="q('s1',1)">+</button></div></div>
        <div class="row"><span>Tables</span><div><button type="button" class="btn-qty" onclick="q('ta1',-1)">-</button><input name="Tables" id="ta1" value="0" class="num" readonly><button type="button" class="btn-qty" onclick="q('ta1',1)">+</button></div></div>

        <button type="submit" class="submit-btn">Submit Request</button>
    </form>
</div>
<script>
    function q(id, val) {
        let i = document.getElementById(id);
        let n = parseInt(i.value) + val;
        if (n >= 0) i.value = n;
    }
</script>
</body>
</html>
