<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ram Tent House - Booking Portal</title>
    <style>
        :root { --primary: #003d3d; --gold: #d4af37; --white: #ffffff; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            /* image_b5f281.png లోని బ్లూ డెకరేషన్ బ్యాక్‌గ్రౌండ్‌గా */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('image_b5f281.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .header { 
            background: rgba(0, 61, 61, 0.85); 
            color: white; text-align: center; padding: 40px 10px; 
            border-bottom: 4px solid var(--gold);
        }

        /* image_b5eec3.jpg లోగో స్టైల్ */
        .logo-box {
            width: 110px; height: 110px; background: var(--white);
            border-radius: 20px; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .logo-box img { width: 90%; height: auto; border-radius: 10px; }

        .container { 
            max-width: 500px; margin: 30px auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 25px; /* image_b5eb9a.jpg లాంటి గుండ్రటి డిజైన్ */
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: var(--primary); }

        /* కస్టమర్ నంబర్ ఎంటర్ చేసే బాక్స్ డిజైన్ */
        input[type="text"], input[type="tel"], input[type="date"], textarea {
            width: 100%; padding: 14px; border: 2px solid #ccc; 
            border-radius: 15px; box-sizing: border-box; font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; border-width: 2px; }

        h3 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 30px; }

        .item-card { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #f9f9f9; padding: 12px 15px; border-radius: 15px; 
            margin-bottom: 10px; border: 1px solid #ddd;
        }

        .item-name { font-weight: 600; color: #444; }

        .controls { display: flex; align-items: center; }
        .btn-qty { 
            width: 35px; height: 35px; background: var(--primary); 
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-size: 20px; font-weight: bold;
        }
        .qty-input { width: 50px; text-align: center; border: none; font-size: 18px; font-weight: bold; background: transparent; color: var(--primary); }

        .submit-btn { 
            width: 100%; background: var(--primary); color: white; 
            padding: 18px; border: none; border-radius: 15px; 
            font-size: 20px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s;
            text-transform: uppercase;
        }
        .submit-btn:hover { background: #002222; transform: scale(1.02); }

        .footer-info { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">
        <!-- లోగో ఇమేజ్ - image_b5eec3.jpg -->
        <img src="image_b5eec3.jpg" alt="Ram Tent House Logo">
    </div>
    <h1 style="letter-spacing: 2px; margin: 0;">RAM TENT HOUSE</h1>
    <p style="margin-top: 10px; font-weight: bold; color: var(--gold);">📞 7306082427 | బి. రమేష్</p>
</div>

<div class="container">
    <form action="https://formspree.io/f/mbdwleja" method="POST">
        
        <input type="hidden" name="_next" value="https://ram-tent-house-.github.io/thanks.html">

        <div class="form-group">
            <label>Customer Name (కస్టమర్ పేరు):</label>
            <input type="text" name="Customer_Name" required placeholder="Enter Full Name">
        </div>

        <div class="form-group">
            <label>Customer Phone Number (కస్టమర్ ఫోన్):</label>
            <!-- ఇక్కడ కస్టమర్ తన నంబర్ టైప్ చేయవచ్చు -->
            <input type="tel" name="Customer_Phone" required placeholder="Enter 10 Digit Mobile Number" pattern="[0-9]{10}">
        </div>

        <div class="form-group">
            <label>Function Date (తేదీ):</label>
            <input type="date" name="Date" required>
        </div>

        <h3>Items (వస్తువుల ఎంపిక)</h3>
        
        <div class="item-card">
            <span class="item-name">Plastic Chairs</span>
            <div class="controls">
                <button type="button" class="btn-qty" onclick="q('c1',-1)">-</button>
                <input type="number" name="Chairs" id="c1" value="0" readonly class="qty-input">
                <button type="button" class="btn-qty" onclick="q('c1',1)">+</button>
            </div>
        </div>

        <div class="item-card">
            <span class="item-name">Steel Tables</span>
            <div class="controls">
                <button type="button" class="btn-qty" onclick="q('t1',-1)">-</button>
                <input type="number" name="Tables" id="t1" value="0" readonly class="qty-input">
                <button type="button" class="btn-qty" onclick="q('t1',1)">+</button>
            </div>
        </div>

        <div class="item-card">
            <span class="item-name">Coolers / Fans</span>
            <div class="controls">
                <button type="button" class="btn-qty" onclick="q('f1',-1)">-</button>
                <input type="number" name="Fans" id="f1" value="0" readonly class="qty-input">
                <button type="button" class="btn-qty" onclick="q('f1',1)">+</button>
            </div>
        </div>

        <div class="item-card">
            <span class="item-name">Lighting (లైటింగ్)</span>
            <div class="controls">
                <button type="button" class="btn-qty" onclick="q('l1',-1)">-</button>
                <input type="number" name="Lighting" id="l1" value="0" readonly class="qty-input">
                <button type="button" class="btn-qty" onclick="q('l1',1)">+</button>
            </div>
        </div>

        <div class="item-card">
            <span class="item-name">Sound System (మైక్ సెట్)</span>
            <div class="controls">
                <button type="button" class="btn-qty" onclick="q('s1',-1)">-</button>
                <input type="number" name="Sound_System" id="s1" value="0" readonly class="qty-input">
                <button type="button" class="btn-qty" onclick="q('s1',1)">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>Others (ఇతర వివరాలు):</label>
            <textarea name="Other_Items" rows="3" placeholder="ఇంకేవైనా వస్తువులు కావాలంటే ఇక్కడ రాయండి..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Order</button>
        
        <div class="footer-info">
            © 2026 Ram Tent House. All Rights Reserved.
        </div>
    </form>
</div>

<script>
    function q(id, v) {
        const i = document.getElementById(id);
        let val = parseInt(i.value) || 0;
        let res = val + v;
        if (res >= 0) i.value = res;
    }
</script>

</body>
</html>
